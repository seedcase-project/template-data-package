[global]
flavor = "quarto"
exclude = [
  # Common directories to exclude
  ".github",
  # This is autogenerated from the `.qmd` version
  "**/README.md",
  # This has its own structure
  "**/LICENSE.md",
  # These are autogenerated by Flower
  "docs/resources",
  "docs/index.qmd",
]

# List style: `-`
[MD004]
style = "dash"

# Wrap list items
[MD032]
allow-lazy-continuation = false

# Reflow text
[MD013]
reflow = true
reflow-mode = "normalize"

# Fix tables and their separator row
[MD060]
enabled = true
style = "aligned-no-space"
